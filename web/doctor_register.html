<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #FDF9F1;
            color: #2D1E16;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 40px 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-sub {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #2D1E16;
            text-transform: uppercase;
        }

        .header-main {
            font-size: 38px;
            font-weight: 900;
            color: #2D1E16;
            margin: 8px 0 16px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 15px;
            color: #888;
            line-height: 1.5;
            margin-bottom: 40px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            background: #FFFFFF;
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 4px 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #EBE4D8;
        }

        .input-wrapper.error {
            border-color: #ff4d4f;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 16px 0;
            font-size: 16px;
            color: #2D1E16;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #CCCCCC;
        }

        .toggle-password {
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding-left: 12px;
        }

        .error-msg {
            color: #ff4d4f;
            font-size: 12px;
            margin-top: 6px;
            min-height: 16px;
        }

        .auth-error {
            text-align: center;
            color: #ff4d4f;
            font-size: 14px;
            margin-top: -12px;
            margin-bottom: 16px;
            min-height: 20px;
        }

        .register-btn {
            width: 100%;
            background: #2D1E16;
            color: #FFFFFF;
            border: none;
            border-radius: 30px;
            padding: 20px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            margin-bottom: 32px;
            margin-top: 16px;
            text-transform: uppercase;
        }

        .register-btn:hover {
            opacity: 0.9;
        }

        .footer-link-wrap {
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .footer-link-wrap a {
            color: #2D1E16;
            font-weight: 800;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <div class="header-sub">VISION TRAINING</div>
            <div class="header-main">Doctor Registration</div>
            <p class="subtitle">Apply for professional access to the Ocular Athletic practitioner portal and athlete management tools.</p>
        </div>

        <div class="input-group">
            <label class="input-label">FULL NAME</label>
            <div class="input-wrapper" id="nameWrapper">
                <input type="text" id="fullName" placeholder="Dr. Julian Vane">
            </div>
            <div class="error-msg" id="nameError"></div>
        </div>

        <div class="input-group">
            <label class="input-label">MEDICAL LICENSE ID</label>
            <div class="input-wrapper" id="licenseWrapper">
                <input type="text" id="license" placeholder="MED-992031">
            </div>
            <div class="error-msg" id="licenseError"></div>
        </div>

        <div class="input-group">
            <label class="input-label">HOSPITAL/CLINIC Name</label>
            <div class="input-wrapper" id="clinicWrapper">
                <input type="text" id="clinic" placeholder="Metropolitan Performance Vision">
            </div>
            <div class="error-msg" id="clinicError"></div>
        </div>

        <div class="input-group">
            <label class="input-label">CLINIC EMAIL</label>
            <div class="input-wrapper" id="emailWrapper">
                <input type="email" id="email" placeholder="julian.vane@clinic.com">
            </div>
            <div class="error-msg" id="emailError"></div>
        </div>

        <div class="input-group">
            <label class="input-label">CREATE PASSWORD</label>
            <div class="input-wrapper" id="passwordWrapper">
                <input type="password" id="password" placeholder="••••••••">
                <i class="fa-regular fa-eye-slash toggle-password" id="eyeBtn" onclick="togglePassword()"></i>
            </div>
            <div class="error-msg" id="passwordError"></div>
        </div>

        <div class="input-group">
            <label class="input-label">CONFIRM PASSWORD</label>
            <div class="input-wrapper" id="confirmWrapper">
                <input type="password" id="confirm" placeholder="••••••••">
            </div>
            <div class="error-msg" id="confirmError"></div>
        </div>

        <div class="auth-error" id="authError"></div>

        <button class="register-btn" id="registerBtn">
            CREATE DOCTOR ACCOUNT
        </button>

        <div class="footer-link-wrap">
            Already have an account? <a href="doctor_login.html">Login here</a>
        </div>

    </div>

    <script src="js/api.js"></script>
    <script>
        const inputs = {
            fullName: document.getElementById("fullName"),
            license: document.getElementById("license"),
            clinic: document.getElementById("clinic"),
            email: document.getElementById("email"),
            password: document.getElementById("password"),
            confirm: document.getElementById("confirm")
        };

        const wrappers = {
            fullName: document.getElementById("nameWrapper"),
            license: document.getElementById("licenseWrapper"),
            clinic: document.getElementById("clinicWrapper"),
            email: document.getElementById("emailWrapper"),
            password: document.getElementById("passwordWrapper"),
            confirm: document.getElementById("confirmWrapper")
        };

        const errors = {
            fullName: document.getElementById("nameError"),
            license: document.getElementById("licenseError"),
            clinic: document.getElementById("clinicError"),
            email: document.getElementById("emailError"),
            password: document.getElementById("passwordError"),
            confirm: document.getElementById("confirmError")
        };

        const authError = document.getElementById("authError");
        const registerBtn = document.getElementById("registerBtn");

        function togglePassword() {
            const eyeBtn = document.getElementById("eyeBtn");
            if (inputs.password.type === "password") {
                inputs.password.type = "text";
                eyeBtn.classList.replace("fa-eye-slash", "fa-eye");
            } else {
                inputs.password.type = "password";
                eyeBtn.classList.replace("fa-eye", "fa-eye-slash");
            }
        }

        function clearErrors() {
            Object.values(errors).forEach(e => e.innerText = "");
            Object.values(wrappers).forEach(w => w.classList.remove("error"));
            authError.innerText = "";
        }

        Object.values(inputs).forEach(input => {
            input.addEventListener("input", () => {
                const key = Object.keys(inputs).find(k => inputs[k] === input);
                errors[key].innerText = "";
                wrappers[key].classList.remove("error");
                authError.innerText = "";
            });
            input.addEventListener("blur", () => {
                if(!input.value.trim()) {
                    const key = Object.keys(inputs).find(k => inputs[k] === input);
                    errors[key].innerText = "Required";
                    wrappers[key].classList.add("error");
                } else if (input.id === "password") {
                    const regex = /^(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).+$/;
                    if(!regex.test(input.value)) {
                        errors.password.innerText = "1 uppercase, 1 number, 1 special char required";
                        wrappers.password.classList.add("error");
                    }
                }
            });
        });

        registerBtn.addEventListener("click", () => {
            let valid = true;
            Object.values(inputs).forEach(input => {
                const key = Object.keys(inputs).find(k => inputs[k] === input);
                errors[key].innerText = "";
                wrappers[key].classList.remove("error");
            });
            authError.innerText = "";

            const vals = {
                fullName: inputs.fullName.value.trim(),
                license: inputs.license.value.trim(),
                clinic: inputs.clinic.value.trim(),
                email: inputs.email.value.trim(),
                password: inputs.password.value.trim(),
                confirm: inputs.confirm.value.trim()
            };

            if (!vals.fullName) { errors.fullName.innerText = "Required"; wrappers.fullName.classList.add("error"); valid = false; }
            if (!vals.license) { errors.license.innerText = "Required"; wrappers.license.classList.add("error"); valid = false; }
            if (!vals.clinic) { errors.clinic.innerText = "Required"; wrappers.clinic.classList.add("error"); valid = false; }
            if (!vals.email) { errors.email.innerText = "Required"; wrappers.email.classList.add("error"); valid = false; }
            if (!vals.password) { errors.password.innerText = "Required"; wrappers.password.classList.add("error"); valid = false; }
            else {
                const regex = /^(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).+$/;
                if(!regex.test(vals.password)) {
                    errors.password.innerText = "1 uppercase, 1 number, 1 special char required";
                    wrappers.password.classList.add("error");
                    valid = false;
                }
            }
            if (!vals.confirm) { errors.confirm.innerText = "Required"; wrappers.confirm.classList.add("error"); valid = false; }
            
            if (vals.password && vals.confirm && vals.password !== vals.confirm) {
                errors.confirm.innerText = "Passwords do not match";
                wrappers.confirm.classList.add("error");
                valid = false;
            }

            if (!valid) return;

            registerBtn.innerText = "CREATING...";
            registerBtn.style.opacity = "0.7";

            // Using the doctor_register.php endpoint
            fetch(BASE_URL + "doctor_register.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    full_name: vals.fullName,
                    medical_license: vals.license,
                    hospital_name: vals.clinic,
                    clinic_email: vals.email,
                    password: vals.password
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    window.location.href = "doctor_login.html";
                } else {
                    authError.innerText = data.message || "Registration failed";
                    registerBtn.innerText = "CREATE DOCTOR ACCOUNT";
                    registerBtn.style.opacity = "1";
                }
            })
            .catch(() => {
                authError.innerText = "Server connection failed";
                registerBtn.innerText = "CREATE DOCTOR ACCOUNT";
                registerBtn.style.opacity = "1";
            });
        });
    </script>
</body>
</html>
