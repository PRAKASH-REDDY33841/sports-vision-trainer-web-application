<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Distraction Layer</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:black;
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
    color:white;
}

/* ---------- TOP BAR ---------- */

.topbar{
    position:absolute;
    top:0;
    width:100%;
    padding:18px 25px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-sizing:border-box;
    z-index:1000;
    position:relative;
}

#speedLabel{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
}

.settings{
    cursor:pointer;
    font-size:20px;
}

/* ---------- GAME AREA ---------- */

.dot{
    position:absolute;
    width:40px;
    height:40px;
    border-radius:50%;
    cursor:pointer;
}

/* ---------- BOTTOM INFO ---------- */

.bottom{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
}

.combo{
    color:yellow;
}

/* ---------- SETTINGS MODAL ---------- */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
}

.modal.active{
    display:flex;
}

.modal-box{
    background:#d7ccc8;
    color:black;
    width:380px;
    padding:30px;
    border-radius:25px;
}

.chip{
    padding:8px 16px;
    border-radius:12px;
    border:2px solid #888;
    cursor:pointer;
    margin-right:8px;
    margin-top:8px;
    display:inline-block;
}

.chip.active{
    background:#f4c7a1;
    border-color:#f4c7a1;
}

.exit-btn{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:red;
    color:white;
    cursor:pointer;
}

/* ---------- RESULT OVERLAY ---------- */

.report-overlay{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#1e293b,#0f172a);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:5000;
}

.report-card{
    background:#f1f5f9;
    color:#0f172a;
    width:400px;
    padding:40px;
    border-radius:30px;
}

.report-row{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.primary-btn{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(to right,#6366f1,#4f46e5);
    color:white;
    cursor:pointer;
}

.outline-btn{
    width:100%;
    padding:15px;
    margin-top:12px;
    border-radius:12px;
    background:transparent;
    border:2px solid #4f46e5;
    color:#4f46e5;
    cursor:pointer;
}

/* ============================= */
/* TABLET RESPONSIVE */
/* ============================= */

@media (max-width:1024px){

.topbar{
padding:16px 20px;
}

#speedLabel{
font-size:15px;
}

.settings{
font-size:18px;
}

.dot{
width:36px;
height:36px;
}

.modal-box{
width:340px;
padding:26px;
}

.report-card{
width:360px;
padding:30px;
}

}

/* ============================= */
/* MOBILE RESPONSIVE */
/* ============================= */

@media (max-width:768px){

.topbar{
padding:14px 18px;
}

#speedLabel{
font-size:14px;
}

.settings{
font-size:18px;
}

.dot{
width:32px;
height:32px;
}

.bottom{
font-size:14px;
bottom:18px;
}

.modal-box{
width:85%;
padding:24px;
}

.report-card{
width:85%;
padding:28px;
}

.primary-btn,
.outline-btn{
padding:14px;
font-size:15px;
}

}

/* ============================= */
/* SMALL MOBILE */
/* ============================= */

@media (max-width:480px){

.topbar{
padding:12px 14px;
font-size:14px;
}

.settings{
font-size:16px;
}

.dot{
width:28px;
height:28px;
}

.bottom{
font-size:13px;
}

.modal-box{
padding:20px;
}

.report-card{
padding:24px;
}

.primary-btn,
.outline-btn{
font-size:14px;
padding:12px;
}

}

</style>
</head>
<body>

<div class="topbar">
    <span id="timeText">30</span>
    <span id="speedLabel">MEDIUM</span>
    <span class="settings" onclick="openSettings()">⚙</span>
</div>

<div class="bottom">
    <div>Score <span id="score">0</span></div>
    <div>Wrong <span id="wrong">0</span></div>
    <div id="comboText" class="combo"></div>
</div>

<!-- SETTINGS -->
<div id="settingsModal" class="modal">
<div class="modal-box">
<h2>Drill Settings</h2>

<p>Motion Speed</p>
<div id="speedGroup">
<span class="chip" onclick="setSpeed('SLOW',1300,this)">SLOW</span>
<span class="chip active" onclick="setSpeed('MEDIUM',900,this)">MEDIUM</span>
<span class="chip" onclick="setSpeed('FAST',550,this)">FAST</span>
</div>

<p style="margin-top:15px;">Duration</p>
<div id="timeGroup">
<span class="chip" onclick="setTime(20,this)">20s</span>
<span class="chip active" onclick="setTime(30,this)">30s</span>
<span class="chip" onclick="setTime(60,this)">60s</span>
</div>

<button class="exit-btn" onclick="exitDrill()">Exit Drill</button>
</div>
</div>

<script src="js/api.js"></script>
<script>

/* ---------- STATE ---------- */

let timeLeft = 30
let spawnDelay = 900
let paused = false

let score = 0
let wrong = 0
let combo = 0
let reactionTotal = 0
let lastSpawn = 0

let timerInterval
let spawnInterval
let gameOver = false

/* ---------- TIMER ---------- */

function startTimer(){
timerInterval = setInterval(()=>{
if(!paused && !gameOver){
timeLeft--
document.getElementById("timeText").innerText = timeLeft
if(timeLeft<=0){
clearInterval(timerInterval)
endGame()
}
}
},1000)
}

/* ---------- SPAWN ENGINE ---------- */

function spawnDots(){
if(gameOver) return

spawnInterval = setInterval(()=>{
if(paused || gameOver) return

document.querySelectorAll(".dot").forEach(d=>d.remove())

let width = window.innerWidth
let height = window.innerHeight

function randomPos(){
return {
x: Math.random()*(width-40),
y: Math.random()*(height-120)
}
}

for(let i=0;i<6;i++){
createDot(randomPos(),false)
}

createDot(randomPos(),true)
lastSpawn = Date.now()

},spawnDelay)
}

function createDot(pos,isTarget){
let dot = document.createElement("div")
dot.className="dot"
dot.style.left=pos.x+"px"
dot.style.top=pos.y+"px"
dot.style.background=isTarget?"red":"gray"

dot.onclick=function(e){
if(paused || gameOver) return
e.stopPropagation()

if(isTarget){
let rt = Date.now()-lastSpawn
reactionTotal += rt
combo++
score += (1 + Math.floor(combo/3))
}else{
wrong++
combo=0
}

updateUI()
}

document.body.appendChild(dot)
}

/* ---------- UI ---------- */

function updateUI(){
document.getElementById("score").innerText=score
document.getElementById("wrong").innerText=wrong
document.getElementById("comboText").innerText=
combo>=3?"COMBO x"+combo:""
}

/* ---------- SETTINGS ---------- */

function openSettings(){
paused=true
document.getElementById("settingsModal").classList.add("active")
}

document.getElementById("settingsModal").onclick=function(e){
if(e.target===this){
paused=false
this.classList.remove("active")
}
}

function setSpeed(label,delay,el){
spawnDelay=delay
document.getElementById("speedLabel").innerText=label
document.querySelectorAll("#speedGroup .chip").forEach(c=>c.classList.remove("active"))
el.classList.add("active")

clearInterval(spawnInterval)
spawnDots()
}

function setTime(t,el){
timeLeft=t
document.getElementById("timeText").innerText=t
document.querySelectorAll("#timeGroup .chip").forEach(c=>c.classList.remove("active"))
el.classList.add("active")
}

function exitDrill(){
window.location.href="sports.html"
}

/* ---------- RESULT ---------- */

function endGame(){
    gameOver=true;
    clearInterval(spawnInterval);

    let avg = score===0?0:Math.floor(reactionTotal/score);
    let finalScore = score*150 + combo*10 - wrong*40 - Math.floor(avg/6);

    const sessionData = {
        gameType: "distraction",
        score: finalScore,
        avgReaction: avg,
        wrong: wrong,
        timestamp: Date.now()
    };

    // Save to local storage
    let sessions = JSON.parse(localStorage.getItem("sessions")) || [];
    sessions.push(sessionData);
    localStorage.setItem("sessions", JSON.stringify(sessions));

    // Save to backend
    if (typeof saveSession === "function") {
        saveSession(sessionData);
    }

    const overlay=document.createElement("div");
    overlay.className="report-overlay";
    overlay.innerHTML=`
    <div class="report-card">
    <h2>Performance Report 🎯</h2>
    <div class="report-row"><span>Hits</span><span>${score}</span></div>
    <div class="report-row"><span>Wrong</span><span>${wrong}</span></div>
    <div class="report-row"><span>Avg Reaction</span><span>${avg} ms</span></div>
    <div class="report-row"><span>Score</span><span>${finalScore}</span></div>
    <button class="primary-btn" onclick="location.reload()">Start Again</button>
    <button class="outline-btn" onclick="goHome()">Back To Home</button>
    </div>
    `;
    document.body.appendChild(overlay);
}

function goHome(){
window.location.href="sports.html"
}

startTimer()
spawnDots()

</script>

</body>
</html>
