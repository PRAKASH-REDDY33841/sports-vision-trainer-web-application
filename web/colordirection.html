<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Color + Direction</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:black;
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
    color:white;
}

/* TOP BAR */
.topbar{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px 30px;
    box-sizing:border-box;
    font-size:18px;
    align-items:center;
}

.settings-icon{
    cursor:pointer;
    font-size:22px;
}

/* RULE CARD */
.rule-box{
    position:absolute;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.15);
    padding:12px 18px;
    border-radius:16px;
    font-size:14px;
}

/* STIMULUS */
.stimulus{
    position:absolute;
    width:220px;
    height:220px;
    border-radius:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:80px;
    font-weight:bold;
    color:black;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:none;
}

/* BOTTOM STATS */
.bottom{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    font-size:16px;
}

/* SETTINGS */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal.active{
    display:flex;
}

.modal-content{
    background:#ede2d9;
    padding:35px;
    border-radius:28px;
    width:400px;
    color:black;
}

.chip{
    padding:8px 18px;
    border-radius:12px;
    border:2px solid #888;
    cursor:pointer;
    margin-right:10px;
}

.chip.active{
    background:#f4c7a1;
    border-color:#f4c7a1;
}

.exit-btn{
    margin-top:25px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    background:red;
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* ============================ */
/* TABLET RESPONSIVE (1024px) */
/* ============================ */

@media (max-width:1024px){

.topbar{
padding:18px 25px;
font-size:17px;
}

.rule-box{
font-size:13px;
padding:10px 16px;
}

.stimulus{
width:190px;
height:190px;
font-size:70px;
}

.modal-content{
width:340px;
padding:30px;
}

.bottom{
font-size:15px;
}

}

/* ============================ */
/* MOBILE RESPONSIVE (768px) */
/* ============================ */

@media (max-width:768px){

.topbar{
padding:15px 18px;
font-size:16px;
}

.settings-icon{
font-size:20px;
}

.rule-box{
top:65px;
font-size:13px;
padding:10px 14px;
text-align:center;
}

.stimulus{
width:150px;
height:150px;
font-size:60px;
border-radius:22px;
}

.bottom{
font-size:14px;
bottom:15px;
}

.modal-content{
width:85%;
padding:28px;
}

.chip{
padding:6px 14px;
margin-bottom:8px;
display:inline-block;
}

.exit-btn{
padding:13px;
font-size:15px;
}

}

/* ============================ */
/* SMALL MOBILE (480px) */
/* ============================ */

@media (max-width:480px){

.topbar{
font-size:15px;
}

.rule-box{
font-size:12px;
padding:9px 12px;
}

.stimulus{
width:120px;
height:120px;
font-size:50px;
}

.bottom{
font-size:13px;
}

.modal-content{
padding:24px;
}

.chip{
font-size:13px;
}

.exit-btn{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="topbar">
    <div id="timeText">30</div>
    <div id="speedLabel">MEDIUM</div>
    <div class="settings-icon" onclick="openSettings()">⚙</div>
</div>

<div class="rule-box">
🔴 Red = LEFT<br>
🟢 Green = RIGHT<br>
🔵 Blue = UP<br>
🟡 Yellow = DOWN
</div>

<div id="stimulus" class="stimulus"></div>

<div class="bottom">
Score <span id="scoreText">0</span> |
Wrong <span id="wrongText">0</span> |
Miss <span id="missText">0</span><br>
<span id="comboText"></span>
</div>

<!-- SETTINGS -->
<div id="settingsModal" class="modal">
<div class="modal-content">
<h2>Drill Settings</h2>

<p><b>Motion Speed</b></p>
<div>
<span class="chip" onclick="setSpeed('SLOW',this)">SLOW</span>
<span class="chip active" onclick="setSpeed('MEDIUM',this)">MEDIUM</span>
<span class="chip" onclick="setSpeed('FAST',this)">FAST</span>
</div>

<p style="margin-top:20px;"><b>Duration</b></p>
<div>
<span class="chip" onclick="setTime(20,this)">20s</span>
<span class="chip active" onclick="setTime(30,this)">30s</span>
<span class="chip" onclick="setTime(60,this)">60s</span>
</div>

<button class="exit-btn" onclick="exitDrill()">Exit Drill</button>
</div>
</div>

<script>

/* ---------- STATE ---------- */

let score=0, wrong=0, misses=0, combo=0;
let timeLeft=30;
let speed="MEDIUM";
let paused=false;

let showStimulus=false;
let arrow="⬅";
let color="red";
let reactions=[];
let appearTime=0;

const stimulus=document.getElementById("stimulus");
const timeText=document.getElementById("timeText");
const scoreText=document.getElementById("scoreText");
const wrongText=document.getElementById("wrongText");
const missText=document.getElementById("missText");
const comboText=document.getElementById("comboText");
const modal=document.getElementById("settingsModal");
const speedLabel=document.getElementById("speedLabel");

/* ---------- TIMER ---------- */

let timer=setInterval(()=>{
    if(!paused){
        timeLeft--;
        timeText.innerText=timeLeft;
    }
    if(timeLeft<=0){
        clearInterval(timer);
        endGame();
    }
},1000);

/* ---------- SPEED RAMP ---------- */

function spawnDelay(){
    let base=
        speed==="SLOW"?1300:
        speed==="MEDIUM"?900:650;

    let ramp=Math.min(score*10,300);
    return Math.max(base-ramp,350);
}

/* ---------- GAME LOOP ---------- */

function gameLoop(){

if(paused||timeLeft<=0){
    setTimeout(gameLoop,100);
    return;
}

setTimeout(()=>{

if(paused||timeLeft<=0){
    gameLoop();
    return;
}

arrow=["⬅","➡","⬆","⬇"][Math.floor(Math.random()*4)];

color=["red","green","blue","yellow"]
      [Math.floor(Math.random()*4)];

stimulus.style.background=color;
stimulus.innerText=arrow;
stimulus.style.display="flex";

showStimulus=true;
appearTime=Date.now();

setTimeout(()=>{

if(showStimulus){
misses++;
combo=0;
missText.innerText=misses;
comboText.innerText="";
}

stimulus.style.display="none";
showStimulus=false;
gameLoop();

},850);

},spawnDelay());

}

gameLoop();

/* ---------- EXPECTED ---------- */

function expected(){
if(color==="red") return "⬅";
if(color==="green") return "➡";
if(color==="blue") return "⬆";
return "⬇";
}

/* ---------- TAP DETECTION ---------- */

document.body.addEventListener("click",function(){

if(!showStimulus||paused) return;

let rt=Date.now()-appearTime;
reactions.push(rt);

if(arrow===expected()){
score+=(1+Math.floor(combo/3));
combo++;
scoreText.innerText=score;

if(combo>=3)
comboText.innerText="🔥 COMBO x"+combo;
}
else{
wrong++;
wrongText.innerText=wrong;
combo=0;
comboText.innerText="";
}

stimulus.style.display="none";
showStimulus=false;

});

/* ---------- SETTINGS ---------- */

function openSettings(){
paused=true;
modal.classList.add("active");
}

modal.onclick=function(e){
if(e.target===modal){
paused=false;
modal.classList.remove("active");
}
};

function setSpeed(v,el){
speed=v;
speedLabel.innerText=v;
document.querySelectorAll(".chip")
.forEach(c=>c.classList.remove("active"));
el.classList.add("active");
}

function setTime(t,el){
timeLeft=t;
timeText.innerText=t;
document.querySelectorAll(".chip")
.forEach(c=>c.classList.remove("active"));
el.classList.add("active");
}

function exitDrill(){
window.location.href="sports.html";
}

/* ---------- END GAME ---------- */

function endGame(){

let avg=reactions.length===0?0:
Math.floor(reactions.reduce((a,b)=>a+b,0)/reactions.length);

const params=new URLSearchParams(window.location.search);
const origin=params.get("origin")||"home";

window.location.href=
"reaction_result.html?hits="+score+
"&avg="+avg+
"&misses="+wrong+
"&score="+score+
"&game=colordirection"+
"&origin="+origin;
}

</script>

</body>
</html>
