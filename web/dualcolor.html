<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dual Color Tap</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:black;
    overflow:hidden;
    color:white;
}

/* ---------- TOP BAR (SAME AS PERIPHERAL) ---------- */

.topbar{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px 30px;
    box-sizing:border-box;
    font-size:18px;
    align-items:center;
}

.settings-icon{
    cursor:pointer;
    font-size:22px;
}

/* ---------- RULE TEXT ---------- */

.rule{
    position:absolute;
    top:70px;
    width:100%;
    text-align:center;
    font-size:18px;
}

/* ---------- STIMULUS ---------- */

.stimulus{
    position:absolute;
    width:200px;
    height:200px;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:none;
    cursor:pointer;
}

/* ---------- FOOTER ---------- */

.footer{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
}

/* ---------- SETTINGS MODAL ---------- */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal.active{
    display:flex;
}

.modal-content{
    background:#ede2d9;
    padding:35px;
    border-radius:28px;
    width:400px;
    color:black;
}

.chip{
    padding:8px 18px;
    border-radius:12px;
    border:2px solid #888;
    cursor:pointer;
    margin-right:10px;
}

.chip.active{
    background:#f4c7a1;
    border-color:#f4c7a1;
}

.exit-btn{
    margin-top:25px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    background:red;
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* ============================ */
/* TABLET RESPONSIVE */
/* ============================ */

@media (max-width:1024px){

.topbar{
padding:16px 22px;
font-size:16px;
}

.rule{
font-size:16px;
top:65px;
}

.stimulus{
width:180px;
height:180px;
}

.footer{
font-size:15px;
}

.modal-content{
width:360px;
padding:30px;
}

}

/* ============================ */
/* MOBILE RESPONSIVE */
/* ============================ */

@media (max-width:768px){

.topbar{
padding:14px 18px;
font-size:15px;
}

.settings-icon{
font-size:20px;
}

.rule{
font-size:15px;
top:60px;
}

.stimulus{
width:150px;
height:150px;
}

.footer{
font-size:14px;
bottom:18px;
}

.modal-content{
width:85%;
padding:26px;
}

.chip{
padding:7px 14px;
font-size:14px;
}

.exit-btn{
font-size:15px;
padding:14px;
}

}

/* ============================ */
/* SMALL MOBILE */
/* ============================ */

@media (max-width:480px){

.topbar{
font-size:14px;
padding:12px 14px;
}

.settings-icon{
font-size:18px;
}

.rule{
font-size:14px;
top:55px;
}

.stimulus{
width:120px;
height:120px;
}

.footer{
font-size:13px;
}

.modal-content{
padding:22px;
}

.chip{
font-size:13px;
padding:6px 12px;
}

.exit-btn{
font-size:14px;
padding:12px;
}

}

</style>
</head>

<body>

<div class="topbar">
    <div id="timeText">30</div>
    <div id="speedLabel">MEDIUM</div>
    <div class="settings-icon" onclick="openSettings()">⚙</div>
</div>

<div id="ruleText" class="rule">Tap: RED & GREEN</div>
<div id="stimulus" class="stimulus"></div>

<div class="footer">
Score <span id="scoreText">0</span> |
Wrong <span id="wrongText">0</span> |
Miss <span id="missText">0</span>
</div>

<!-- SETTINGS -->
<div id="settingsModal" class="modal">
<div class="modal-content">

<h2>Drill Settings</h2>

<p><b>Motion Speed</b></p>
<div>
<span class="chip" onclick="setSpeed('SLOW',this)">SLOW</span>
<span class="chip active" onclick="setSpeed('MEDIUM',this)">MEDIUM</span>
<span class="chip" onclick="setSpeed('FAST',this)">FAST</span>
</div>

<p style="margin-top:20px;"><b>Session Time</b></p>
<div>
<span class="chip" onclick="setTime(20,this)">20s</span>
<span class="chip active" onclick="setTime(30,this)">30s</span>
<span class="chip" onclick="setTime(60,this)">60s</span>
</div>

<button class="exit-btn" onclick="exitDrill()">Exit Drill</button>

</div>
</div>

<script>

let score=0, wrong=0, misses=0;
let timeLeft=30;
let speed="MEDIUM";
let paused=false;
let showStimulus=false;
let color="";
let ruleFlipped=false;
let reactions=[];
let appearTime=0;

const stimulus=document.getElementById("stimulus");
const timeText=document.getElementById("timeText");
const speedLabel=document.getElementById("speedLabel");
const scoreText=document.getElementById("scoreText");
const wrongText=document.getElementById("wrongText");
const missText=document.getElementById("missText");
const ruleText=document.getElementById("ruleText");
const modal=document.getElementById("settingsModal");

/* ---------- TIMER ---------- */

let timer=setInterval(()=>{
if(!paused){
timeLeft--;
timeText.innerText=timeLeft;
}
if(timeLeft<=0){
clearInterval(timer);
endGame();
}
},1000);

/* ---------- RULE FLIP ---------- */

setInterval(()=>{
if(!paused && timeLeft>0){
ruleFlipped=!ruleFlipped;
ruleText.innerText=
!ruleFlipped?
"Tap: RED & GREEN":
"Tap: BLUE & YELLOW";
}
},6000);

/* ---------- SPAWN ---------- */

function spawnDelay(){
return speed==="SLOW"?1200:
speed==="MEDIUM"?800:550;
}

function spawnLoop(){

if(paused || timeLeft<=0){
setTimeout(spawnLoop,100);
return;
}

setTimeout(()=>{

if(paused || timeLeft<=0){
spawnLoop();
return;
}

color=["red","blue","green","yellow"]
[Math.floor(Math.random()*4)];

stimulus.style.background=color;
stimulus.style.display="block";

showStimulus=true;
appearTime=Date.now();

setTimeout(()=>{

if(showStimulus && shouldTap(color,ruleFlipped)){
misses++;
missText.innerText=misses;
}

stimulus.style.display="none";
showStimulus=false;

spawnLoop();

},800);

},spawnDelay());
}

spawnLoop();

/* ---------- CLICK ---------- */

stimulus.onclick=function(){

if(paused || !showStimulus) return;

let rt=Date.now()-appearTime;
reactions.push(rt);

if(shouldTap(color,ruleFlipped)){
score++;
scoreText.innerText=score;
}else{
wrong++;
wrongText.innerText=wrong;
}

stimulus.style.display="none";
showStimulus=false;
};

function shouldTap(c,flipped){
return !flipped
? (c==="red"||c==="green")
: (c==="blue"||c==="yellow");
}

/* ---------- SETTINGS ---------- */

function openSettings(){
paused=true;
modal.classList.add("active");
}

modal.onclick=function(e){
if(e.target===modal){
paused=false;
modal.classList.remove("active");
}
};

function setSpeed(v,el){
speed=v;
speedLabel.innerText=v;
document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
}

function setTime(t,el){
timeLeft=t;
timeText.innerText=t;
document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
}

function exitDrill(){
window.location.href="sports.html";
}

function endGame(){

let avg=reactions.length===0?0:
Math.floor(reactions.reduce((a,b)=>a+b,0)/reactions.length);

const params=new URLSearchParams(window.location.search);
const origin=params.get("origin")||"home";

window.location.href=
"reaction_result.html?hits="+score+
"&avg="+avg+
"&misses="+wrong+
"&score="+score+
"&game=dualcolor"+
"&origin="+origin;
}

</script>

</body>
</html>
