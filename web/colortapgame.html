<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Color Tap Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

/* ===== TOP BAR ===== */

.topbar{
    position:absolute;
    top:15px;
    left:0;
    right:0;
    display:flex;
    justify-content:space-between;
    padding:0 20px;
    align-items:center;
    font-weight:500;
}

.settings-icon{
    cursor:pointer;
}

.info{
    text-align:center;
    margin-top:60px;
}

.dot{
    position:absolute;
    width:52px;
    height:52px;
    border-radius:50%;
    cursor:pointer;
}

/* ===== SETTINGS MODAL ===== */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal.active{
    display:flex;
}

.modal-content{
    background:#d7ccc8;
    width:420px;
    max-width:90%;
    padding:35px;
    border-radius:30px;
    color:#2b2b2b;
    box-sizing:border-box;
}

.modal-content h2{
    margin-top:0;
    font-size:28px;
    font-weight:600;
}

.section-title{
    margin-top:25px;
    margin-bottom:12px;
    font-size:18px;
    font-weight:500;
}

.chip-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.chip{
    padding:8px 18px;
    border-radius:12px;
    border:2px solid #8e8e8e;
    background:transparent;
    cursor:pointer;
    font-weight:500;
}

.chip.active{
    background:#f4c7a1;
    border-color:#f4c7a1;
}

.exit-btn{
    margin-top:30px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:40px;
    background:#e50914;
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
}

/* ============================ */
/* TABLET RESPONSIVE (1024px) */
/* ============================ */

@media (max-width:1024px){

.topbar{
padding:0 18px;
font-size:17px;
}

.info{
margin-top:55px;
font-size:15px;
}

.dot{
width:46px;
height:46px;
}

.modal-content{
width:360px;
padding:30px;
}

.section-title{
font-size:17px;
}

}

/* ============================ */
/* MOBILE RESPONSIVE (768px) */
/* ============================ */

@media (max-width:768px){

.topbar{
top:12px;
padding:0 16px;
font-size:16px;
}

.settings-icon{
font-size:20px;
}

.info{
margin-top:50px;
font-size:14px;
}

.dot{
width:40px;
height:40px;
}

.modal-content{
width:85%;
padding:28px;
}

.modal-content h2{
font-size:24px;
}

.section-title{
font-size:16px;
}

.chip{
padding:7px 14px;
font-size:14px;
}

.exit-btn{
padding:14px;
font-size:15px;
}

}

/* ============================ */
/* SMALL MOBILE (480px) */
/* ============================ */

@media (max-width:480px){

.topbar{
font-size:15px;
}

.info{
font-size:13px;
}

.dot{
width:34px;
height:34px;
}

.modal-content{
padding:24px;
}

.modal-content h2{
font-size:22px;
}

.chip{
font-size:13px;
padding:6px 12px;
}

.exit-btn{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="topbar">
    <div>TIME <span id="timeLeft">30</span></div>
    <div id="speedLabel">MEDIUM</div>
    <div class="settings-icon" onclick="openSettings()">⚙</div>
</div>

<div class="info">
    <div style="color:red">Focus on RED • Tap RED only</div>
    <div id="stats">Hits 0   Misses 0</div>
</div>

<div id="gameArea"></div>

<!-- SETTINGS -->
<div class="modal" id="settingsModal">
    <div class="modal-content">

        <h2>Drill Settings</h2>

        <div class="section-title">Motion Speed</div>
        <div class="chip-row">
            <div class="chip" onclick="setSpeed('SLOW',1100,1900,this)">SLOW</div>
            <div class="chip active" onclick="setSpeed('MEDIUM',700,1500,this)">MEDIUM</div>
            <div class="chip" onclick="setSpeed('FAST',350,800,this)">FAST</div>
        </div>

        <div class="section-title">Session Time</div>
        <div class="chip-row">
            <div class="chip active" onclick="setDuration(30,this)">30s</div>
            <div class="chip" onclick="setDuration(60,this)">1m</div>
            <div class="chip" onclick="setDuration(300,this)">5m</div>
        </div>

        <button class="exit-btn" onclick="exitDrill()">Exit Drill</button>

    </div>
</div>

<script>

/* ===== STATE ===== */

let sessionSeconds = 30;
let timeLeft = 30;
let minDelay = 700;
let maxDelay = 1500;
let speedText = "MEDIUM";

let taps = 0;
let misses = 0;
let reactionTotal = 0;
let lastSpawn = 0;

let visible = false;
let paused = false;

const gameArea = document.getElementById("gameArea");
const timeText = document.getElementById("timeLeft");
const statsText = document.getElementById("stats");
const modal = document.getElementById("settingsModal");
const speedLabel = document.getElementById("speedLabel");

timeText.innerText = timeLeft;

/* ===== TIMER ===== */

let timer = setInterval(()=>{
    if(!paused){
        timeLeft--;
        timeText.innerText=timeLeft;
    }

    if(timeLeft<=0){
        clearInterval(timer);
        showResult();
    }

},1000);

/* ===== STIMULUS LOOP ===== */

async function stimulusLoop(){
    while(timeLeft>0){

        if(paused){
            await sleep(200);
            continue;
        }

        await sleep(random(minDelay,maxDelay));

        if(paused || timeLeft<=0) continue;

        spawnDots();
    }
}

function spawnDots(){

    if(visible) return;

    visible=true;
    gameArea.innerHTML="";

    const colors=["green","blue","yellow"];

    gameArea.appendChild(createDot("red",true));

    for(let i=0;i<3;i++){
        gameArea.appendChild(
            createDot(colors[Math.floor(Math.random()*3)],false)
        );
    }

    lastSpawn=Date.now();
}

function createDot(color,isTarget){

    const dot=document.createElement("div");
    dot.className="dot";
    dot.style.background=color;

    dot.style.left=Math.random()*(window.innerWidth-60)+"px";
    dot.style.top=Math.random()*(window.innerHeight-60)+"px";

    dot.onclick=function(e){
        e.stopPropagation();

        if(isTarget){
            const rt=Date.now()-lastSpawn;
            reactionTotal+=rt;
            taps++;
        } else{
            misses++;
        }

        updateStats();
        visible=false;
        gameArea.innerHTML="";
    };

    return dot;
}

document.body.onclick=function(){
    if(visible){
        misses++;
        updateStats();
        visible=false;
        gameArea.innerHTML="";
    }
};

function updateStats(){
    statsText.innerText="Hits "+taps+"   Misses "+misses;
}

/* ===== SETTINGS ===== */

function openSettings(){
    paused=true;
    modal.classList.add("active");
}

function closeSettings(){
    paused=false;
    modal.classList.remove("active");
}

/* Close when clicking outside */
modal.onclick=function(e){
    if(e.target===modal){
        closeSettings();
    }
};

function setDuration(sec,el){
    sessionSeconds=sec;
    timeLeft=sec;
    timeText.innerText=sec;
    activateChip(el);
}

function setSpeed(label,min,max,el){
    minDelay=min;
    maxDelay=max;
    speedText=label;
    speedLabel.innerText=label;
    activateChip(el);
}

function activateChip(el){
    el.parentElement.querySelectorAll(".chip")
        .forEach(c=>c.classList.remove("active"));
    el.classList.add("active");
}

function exitDrill(){
    clearInterval(timer);
    window.location.href="home.html";
}

/* ===== RESULT ===== */

function showResult(){

    const avg=taps===0?0:Math.floor(reactionTotal/taps);

    const score =
        taps*120 -
        misses*50 -
        Math.floor(avg/6);

    window.location.href =
        "reaction_result.html?hits="+taps+
        "&avg="+avg+
        "&misses="+misses+
        "&score="+score+
        "&game=colortapgame";
}

function sleep(ms){
    return new Promise(res=>setTimeout(res,ms));
}

function random(min,max){
    return Math.floor(Math.random()*(max-min)+min);
}

stimulusLoop();

</script>

</body>
</html>
