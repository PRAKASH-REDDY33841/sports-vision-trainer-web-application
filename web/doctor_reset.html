<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #FDF9F1;
            color: #2D1E16;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 40px;
            left: 24px;
            font-size: 24px;
            color: #2D1E16;
            text-decoration: none;
            cursor: pointer;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 40px 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-sub {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #2D1E16;
            text-transform: uppercase;
        }

        .header-main {
            font-size: 38px;
            font-weight: 900;
            color: #2D1E16;
            margin: 8px 0 16px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 15px;
            color: #888;
            line-height: 1.5;
            margin-bottom: 40px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            background: #FFFFFF;
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 4px 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #EBE4D8;
        }

        .input-wrapper.error {
            border-color: #ff4d4f;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 16px 0;
            font-size: 16px;
            color: #2D1E16;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #CCCCCC;
        }

        .toggle-password {
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding-left: 12px;
        }

        .error-msg {
            color: #ff4d4f;
            font-size: 12px;
            margin-top: 6px;
            min-height: 16px;
        }

        .auth-error {
            text-align: center;
            color: #ff4d4f;
            font-size: 14px;
            margin-top: -12px;
            margin-bottom: 16px;
            min-height: 20px;
        }

        .success-msg {
            text-align: center;
            color: #4CAF50;
            font-size: 15px;
            font-weight: bold;
            margin-top: -12px;
            margin-bottom: 16px;
            min-height: 20px;
        }

        .submit-btn {
            width: 100%;
            background: #2D1E16;
            color: #FFFFFF;
            border: none;
            border-radius: 30px;
            padding: 20px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            margin-top: 16px;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <div class="header-sub">VISION TRAINING</div>
            <div class="header-main">New Password</div>
            <p class="subtitle">Set a new secure password for your clinical account.</p>
        </div>

        <div class="input-group">
            <label class="input-label">NEW PASSWORD</label>
            <div class="input-wrapper" id="passwordWrapper">
                <input type="password" id="password" placeholder="••••••••">
                <i class="fa-regular fa-eye-slash toggle-password" id="eyeBtn" onclick="togglePassword()"></i>
            </div>
            <div class="error-msg" id="passwordError"></div>
        </div>

        <div class="input-group">
            <label class="input-label">CONFIRM PASSWORD</label>
            <div class="input-wrapper" id="confirmWrapper">
                <input type="password" id="confirm" placeholder="••••••••">
            </div>
            <div class="error-msg" id="confirmError"></div>
        </div>

        <div class="auth-error" id="authError"></div>
        <div class="success-msg" id="successMsg"></div>

        <button class="submit-btn" id="submitBtn">
            RESET PASSWORD
        </button>

    </div>

    <script src="js/api.js"></script>
    <script>
        const passInput = document.getElementById("password");
        const confirmInput = document.getElementById("confirm");

        const passWrapper = document.getElementById("passwordWrapper");
        const confirmWrapper = document.getElementById("confirmWrapper");

        const passError = document.getElementById("passwordError");
        const confirmError = document.getElementById("confirmError");
        
        const authError = document.getElementById("authError");
        const successMsg = document.getElementById("successMsg");
        const submitBtn = document.getElementById("submitBtn");

        const resetEmail = localStorage.getItem("resetEmail");

        if (!resetEmail) {
            window.location.href = "doctor_login.html";
        }

        function togglePassword() {
            const eyeBtn = document.getElementById("eyeBtn");
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeBtn.classList.replace("fa-eye-slash", "fa-eye");
            } else {
                passInput.type = "password";
                eyeBtn.classList.replace("fa-eye", "fa-eye-slash");
            }
        }

        function clearErrors() {
            passError.innerText = "";
            confirmError.innerText = "";
            passWrapper.classList.remove("error");
            confirmWrapper.classList.remove("error");
            authError.innerText = "";
            successMsg.innerText = "";
        }

        passInput.addEventListener("input", clearErrors);
        confirmInput.addEventListener("input", clearErrors);

        passInput.addEventListener("blur", () => {
            if(!passInput.value.trim()) { passError.innerText = "Required"; passWrapper.classList.add("error"); }
        });
        confirmInput.addEventListener("blur", () => {
            if(!confirmInput.value.trim()) { confirmError.innerText = "Required"; confirmWrapper.classList.add("error"); }
        });

        submitBtn.addEventListener("click", () => {
            clearErrors();
            let valid = true;

            const password = passInput.value.trim();
            const confirm = confirmInput.value.trim();

            if (!password) { passError.innerText = "Required"; passWrapper.classList.add("error"); valid = false; }
            if (!confirm) { confirmError.innerText = "Required"; confirmWrapper.classList.add("error"); valid = false; }

            if (password && confirm && password !== confirm) {
                confirmError.innerText = "Passwords do not match";
                confirmWrapper.classList.add("error");
                valid = false;
            }

            if (!valid) return;

            submitBtn.innerText = "SAVING...";
            submitBtn.style.opacity = "0.7";

            // Using the doctor_reset_password_final.php endpoint
            fetch(BASE_URL + "doctor_reset_password_final", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: resetEmail, password: password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    localStorage.removeItem("resetEmail");
                    successMsg.innerText = "Password reset successfully!";
                    setTimeout(() => {
                        window.location.href = "doctor_login.html";
                    }, 1500);
                } else {
                    authError.innerText = data.message || "Failed to reset password";
                    submitBtn.innerText = "RESET PASSWORD";
                    submitBtn.style.opacity = "1";
                }
            })
            .catch(() => {
                authError.innerText = "Server connection failed";
                submitBtn.innerText = "RESET PASSWORD";
                submitBtn.style.opacity = "1";
            });
        });
    </script>
</body>
</html>
